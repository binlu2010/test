<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="register.css"></head>
<body>
  <form id="registerForm">
    <div class="form-group">
      <label>手机号/邮箱</label>
      <input type="text" id="account" required>
      <div class="error-message" id="accountError"></div>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" required>
      <div class="error-message" id="passwordError"></div>
    </div>
    <div class="form-group">
      <label>确认密码</label>
      <input type="password" id="confirmPwd" required>
      <div class="error-message" id="confirmError"></div>
    </div>
    <button type="submit" class="btn-submit" disabled>注册</button>
  </form>
  <div class="login-link">已有账号？<a href="#">立即登录</a></div>
</body>
</html>
